    /*yaha pr image hatane ke liye uss image ka li udana padega to image ka 
    parent node li hi hai*/
    document.querySelector('#images').addEventListener('click', function (e) {

        if (e.target.tagName === 'IMG') {
            e.target.parentNode.remove(); //clicking on particukarimage will be removing it
        }

    })  //agar li pe click kr doge to ud jayega pura list hi kyuki li ka parant node to ul hoga
