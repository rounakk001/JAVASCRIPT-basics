<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chai Aur Code| DOM</title>
</head>
<body style="background-color: #212121; color:#fff;">
    <ul class="language">
            <li>Javascript</li>
    </ul>

    
</body>

<script>
        function addLanguage(langname){
           const li= document.createElement('li');
           li.innerHTML=`${langname}`   //slow hota hai bahut
           document.querySelector('.language').appendChild(li);
        }
        addLanguage("python")
        addLanguage("typescript")

        function addoptilanguage(langname){
            const li=document.createElement('li');
            li.appendChild(document.createTextNode(langname))
            document.querySelector('.language').appendChild(li);
        }

        
        addoptilanguage("golang")


        //edit  first type
        const secondlang=document.querySelector('li:nth-child(2)');
        // firstlang.innerHTML="ruby" ---this is not optimised

        const newli=document.createElement('li');
        newli.textContent="ruby";
        secondlang.replaceWith(newli);

        //edit second type
        const firstlang=document.querySelector('li:first-child');
        firstlang.outerHTML="<li>ruby</li>"

        //remove
        const firstlangrem=document.querySelector('li:first-child');
         firstlangrem.remove()
</script>


</html>

<!-- 📘 DOM Manipulation Notes (Add Elements Efficiently)
🔹 1. Basic Method: innerHTML
function addLanguage(langname){
   const li = document.createElement('li');
   li.innerHTML = langname;
   document.querySelector('.language').appendChild(li);
}
❌ Drawbacks:

HTML string parse hoti hai (slow)

Browser ko DOM tree rebuild karna padta hai

XSS attack risk ⚠️

Large data pe performance down

🔹 2. Optimized Method: createTextNode()
function addOptiLanguage(langname){
    const li = document.createElement('li');
    li.appendChild(document.createTextNode(langname));
    document.querySelector('.language').appendChild(li);
}
✅ Advantages:

No HTML parsing → faster

Safe (script execute nahi hoga)

Direct DOM node insertion

🔹 3. Best Method: textContent
function addLanguageBetter(langname){
    const li = document.createElement('li');
    li.textContent = langname;
    document.querySelector('.language').appendChild(li);
}
🚀 Why BEST?

Fastest

Clean syntax

Safe from XSS

Recommended in interviews

🧠 Core Concept: DOM Tree & Traversal
🌳 DOM Structure:
<ul class="language">
   <li>JavaScript</li>
   <li>Python</li>
</ul>

👉 Ye internally ek tree structure hota hai:

UL
├── LI (JavaScript)
└── LI (Python)
🔍 innerHTML vs Direct Node Creation
🔴 innerHTML Flow:
String → Parse → Create Nodes → Attach → Render
🟢 Optimized Flow:
Create Node → Attach → Done ✅

👉 Isliye tu bola tha:

“tree traverse karni padegi”

✔️ Exactly — innerHTML me browser ko parsing + tree build karna padta hai.

⚡ 4. Batch Optimization: DocumentFragment
const fragment = document.createDocumentFragment();

["python","typescript","java"].forEach(lang => {
    const li = document.createElement('li');
    li.textContent = lang;
    fragment.appendChild(li);
});

document.querySelector('.language').appendChild(fragment);
🚀 Benefits:

DOM reflow/repaint sirf 1 baar

Multiple insert → faster performance

Real-world apps me use hota hai

🔥 Important Interview Points
🔸 innerHTML vs textContent
Feature	innerHTML	textContent
HTML parsing	✅	❌
Speed	❌ Slow	✅ Fast
Security	❌ Unsafe	✅ Safe
Use case	Rare	Preferred
🔸 Node Types

Element Node → <li>

Text Node → "Python"

Comment Node → comment -->
